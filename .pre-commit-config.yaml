# pre-commit — Hooks de validation automatique avant chaque commit
#
# Installation (une seule fois) :
#   pip install pre-commit
#   pre-commit install
#
# Lancer manuellement sur tous les fichiers :
#   pre-commit run --all-files
#
# Les memes verifications tournent aussi dans la CI (ci.yml).

repos:

  # ── Hooks generaux ────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        name: Supprimer les espaces en fin de ligne
      - id: end-of-file-fixer
        name: Assurer une ligne vide en fin de fichier
      - id: check-yaml
        name: Valider la syntaxe YAML
      - id: check-json
        name: Valider la syntaxe JSON
      - id: check-merge-conflict
        name: Detecter les marqueurs de conflit git
      - id: check-added-large-files
        name: Bloquer les fichiers > 1 MB
        args: ["--maxkb=1024"]
      - id: detect-private-key
        name: Detecter les cles privees accidentelles
      - id: check-case-conflict
        name: Detecter les conflits de casse dans les noms de fichiers
      - id: mixed-line-ending
        name: Normaliser les fins de ligne (LF)
        args: ["--fix=lf"]

  # ── Python : formatage (black) ─────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        name: Formater le code Python avec black
        language_version: python3
        args: ["--line-length=120"]

  # ── Python : linting (flake8) ─────────────────────────────────────────────
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: Linter Python avec flake8
        args:
          - "--max-line-length=120"
          - "--extend-ignore=E203,W503"
          - "--exclude=.git,__pycache__,venv,env"

  # ── Shell scripts (shellcheck) ────────────────────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        name: Lint des scripts shell avec shellcheck
        args: ["--severity=warning"]

  # ── YAML (yamllint) ──────────────────────────────────────────────────────
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        name: Valider la qualite des fichiers YAML
        args: ["-d", "relaxed"]
