<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Gestionnaire de prêts{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f7fa; color: #1a1a2e; }
    header { background: #16213e; color: #fff; padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.1rem; }
    nav a { color: #a8dadc; text-decoration: none; margin-right: 1.2rem; font-size: 0.9rem; }
    nav a:hover { color: #fff; }
    main { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
    h2 { margin-bottom: 1rem; color: #16213e; }
    h3 { margin-bottom: 0.75rem; color: #16213e; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    th { background: #16213e; color: #fff; padding: 0.6rem 0.8rem; text-align: left; font-size: 0.82rem; }
    td { padding: 0.55rem 0.8rem; border-bottom: 1px solid #e9ecef; font-size: 0.88rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f0f4ff; }
    .btn { display: inline-block; padding: 0.45rem 1rem; border-radius: 5px; font-size: 0.88rem; text-decoration: none; cursor: pointer; border: none; }
    .btn-primary { background: #457b9d; color: #fff; }
    .btn-primary:hover { background: #1d3557; }
    .btn-success { background: #2d9e6b; color: #fff; }
    .btn-success:hover { background: #1e6b49; }
    .btn-danger { background: #e63946; color: #fff; }
    .btn-danger:hover { background: #b02030; }
    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; }
    .card { background: #fff; border-radius: 8px; padding: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.3rem; font-size: 0.88rem; font-weight: 600; }
    input[type=text], input[type=email], input[type=number], input[type=date], select, textarea {
      width: 100%; padding: 0.5rem 0.7rem; border: 1px solid #ced4da; border-radius: 5px; font-size: 0.9rem;
    }
    textarea { resize: vertical; min-height: 80px; }
    .errors { background: #fff0f0; border-left: 4px solid #e63946; padding: 0.75rem 1rem; margin-bottom: 1rem; border-radius: 4px; }
    .errors li { color: #c0392b; font-size: 0.88rem; }
    .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.78rem; font-weight: 600; }
    .badge-active { background: #d4edda; color: #155724; }
    .badge-closed { background: #f8d7da; color: #721c24; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .kpi { background: #fff; border-radius: 8px; padding: 1rem 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .kpi .label { font-size: 0.78rem; color: #666; text-transform: uppercase; letter-spacing: .04em; }
    .kpi .value { font-size: 1.4rem; font-weight: 700; color: #16213e; margin-top: 0.2rem; }
    .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .text-right { text-align: right; }
    .text-muted { color: #888; }
    .overdue { color: #e63946; font-weight: 600; }
  </style>
</head>
<body>
  <header>
    <h1>🏦 Gestionnaire de prêts à terme</h1>
    <nav>
      <a href="/">Accueil</a>
      <a href="/borrowers/">Emprunteurs</a>
      <a href="/loans/">Prêts</a>
      <a href="/payments/new">Saisir un paiement</a>
      <a href="/reports/summary">Rapport sommaire</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
